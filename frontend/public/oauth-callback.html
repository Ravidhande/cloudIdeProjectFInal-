<!DOCTYPE html>
<html>
<head>
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #080808;
            color: #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(229, 229, 229, 0.2);
            border-top-color: #e5e5e5;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const userStr = params.get('user');
        const error = params.get('error');

        if (error) {
            window.opener.postMessage({ error: decodeURIComponent(error) }, '*');
        } else if (token && userStr) {
            try {
                const user = JSON.parse(decodeURIComponent(userStr));
                window.opener.postMessage({ success: true, token, user }, '*');
            } catch (e) {
                window.opener.postMessage({ error: 'Failed to parse user data' }, '*');
            }
        } else {
            window.opener.postMessage({ error: 'Missing authentication data' }, '*');
        }
        
        window.close();
    </script>
</body>
</html>
